name: CI

on:
  pull_request:
  push:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: tsc / lint / jest
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc -p RelationshipApp/tsconfig.json --noEmit

      - name: Lint
        run: npm run lint -- --max-warnings=10000

      - name: Test
        run: npm test -- --ci
